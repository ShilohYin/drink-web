<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="../assets/css/menu.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <link rel="stylesheet" href="../assets/css/daily-report.css">
    <title>日盈利汇总</title>
    <style>
      body{
        background-color: #fefbf8;
      }
      .daily-box {
        padding-top: 50px;
        display: flex;
        width: 1200px;
        margin: 0 auto;
      }

      .daily-box form {
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div class="daily-box">
      <img src="../assets/images/daily.png" alt="KAOLA Bubble Tea Logo" class="logo" style="width: 504px;">
      <form id="dailyForm" class="daily-form">
        <label>
          <strong><em class="required">*</em> 票  额:</strong>
          <input placeholder="票额" id="votes" required>
        </label>
        <label>
          <strong><em class="required">*</em> 现  金:</strong>
          <input placeholder="现金" id="cash" required>
        </label>
        <label>
          <strong>扫码支付:</strong>
          <input placeholder="扫码支付" id="rmb" required>
        </label>
        <label>
          <strong>消费支出:</strong>
          <input placeholder="消费支出" id="consume" >
        </label>
        <label>
          <strong>Wolt外卖:</strong>
          <input placeholder="Wolt外卖" id="wolt" >
        </label>
        <label>
          <strong>物料:</strong>
          <input placeholder="物料" id="material" >
        </label>
        <label>
          <strong>备注:</strong>
          <input placeholder="备注" id="remark" >
        </label>
        <button class="submit-btn">Submit</button>
      </form>
    </div>

    <script src="../assets/js/config.js"></script>
    <script src="../assets/js/i18n.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/daily.js"></script>
  </body>
</html>
