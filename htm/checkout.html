<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <link rel="stylesheet" href="../assets/css/menu.css">
    <link rel="stylesheet" href="../assets/css/style.css">
    <title>Checkout</title>
  </head>
  <body>
    <header>
      <!-- <h1 data-i18n="checkout">Checkout</h1> -->
      <select id="langSwitch">
        <option value="zh">中文</option>
        <option value="en">English</option>
        <option value="sr">Srpski</option>
      </select>
    </header>
    <form id="checkoutForm">
      <label>
        <strong data-i18n="name">姓名<em class="required">*</em></strong>
        <input placeholder="请输入您的姓名" id="name" required>
      </label>
      <label>
        <strong data-i18n="phone">电话<em class="required">*</em></strong>
        <input placeholder="请输入您的电话" id="phone" required>
      </label>
      <label>
        <strong>地址<em class="required">*</em></strong>
        <input placeholder="请输入您的地址" id="address" required>
      </label>
      <label>
        <strong data-i18n="remark">备注 </strong>
        <textarea placeholder="请输入备注信息" id="remark"></textarea>
      </label>
      <button class="submit-btn">Submit</button>
    </form>
    <script src="../assets/js/i18n.js"></script>
    <script src="../assets/js/app.js"></script>
    <script src="../assets/js/checkout.js"></script>
  </body>
</html>
