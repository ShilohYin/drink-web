<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="../assets/css/menu.css">
<title>Contact</title>
</head>
<body>
<header>
  <h1 data-i18n="contact_us">Contact Us</h1>
  <select id="langSwitch">
    <option value="zh">中文</option>
    <option value="en">English</option>
    <option value="sr">Srpski</option>
  </select>
</header>
<form id="contact">
<input name="name" placeholder="Name" data-i18n-placeholder="name" required>
<input name="phone" placeholder="Phone" data-i18n-placeholder="phone">
<input name="email" placeholder="Email" data-i18n-placeholder="email">
<textarea name="message" placeholder="Message" data-i18n-placeholder="message"></textarea>
<button data-i18n="send">Send</button>
</form>

<script src="../assets/js/i18n.js"></script>
<script type="module">
import {submitContact} from "../assets/js/api.js";

document.getElementById("contact").onsubmit=async(e)=>{
 e.preventDefault();
 const data=Object.fromEntries(new FormData(e.target).entries());
 const result=await submitContact(data);
 alert(JSON.stringify(result));
};

// Language switcher
document.addEventListener('DOMContentLoaded', () => {
  const langSwitch = document.getElementById('langSwitch');
  if (langSwitch) {
    langSwitch.value = localStorage.getItem('lang') || 'zh';
    langSwitch.addEventListener('change', (e) => {
      i18n.setLanguage(e.target.value);
    });
  }
});

// Listen for language changes from other components
window.addEventListener('languageChanged', (e) => {
  const langSwitch = document.getElementById('langSwitch');
  if (langSwitch) {
    langSwitch.value = e.detail.lang;
  }
});
</script>

</body>
</html>
